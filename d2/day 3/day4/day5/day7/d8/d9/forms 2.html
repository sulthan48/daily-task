<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <forms>
        <h2 align="center">Student Regristation Form</h2>
        <label>Name:</label>
        <input type="text">
        <label>Date of birth</label>
        <input type="date">
        <label>Email:</label>
        <input type="email"><br><br>
        <label>Password</label>
        <input type="password"><br><br>
        <label>Mobile Number:</label><br><br>
        <input type="tel" pattern="[0-9]{10}" value="+91">
        <label>Gender</label>
        <input type="radio" name="Gender">Male
        <input type="radio" name="Gender">Female<br><br>
        <label>Nationality:</label>
        <input type="radio" name="nation">Indian
        <input type="radio" name="nation">American
        <input type="radio" name="nation">Austrlia<br><br>
        <label>Skills:</label>
        <input type="checkbox">Python
        <input type="checkbox">Java<br><br>
        <label>Address:</label><br><br>
        <textarea rows="10" cols="30" type="feedback"></textarea><br><br>
        <label>Choose file</label>
        <input type="file" name="file"><br><br>
        <input type="button" value="Register">
    </forms>
    <h2 align="center">Table</h2>
    <table border="1" cellpadding="10" cellspacing="0" align="center">

        <tr>
            <th rowspan="2">Student</th>
            <th colspan="2">Marks</th>
            <th rowspan="2">Total</th>
        </tr>

        <tr>
            <th>Math</th>
            <th>Science</th>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>90</td>
            <td>95</td>
            <td>185</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>88</td>
            <td>91</td>
            <td>179</td>
        </tr>

    </table>

</body>

</html>
